name: Build and Deploy

on:
  workflow_dispatch:
  repository_dispatch:
    types: [skills-updated]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync skills and build
        run: npm run build

      - name: Push to trigger Vercel deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "deploy: sync latest skills from agent-skills"
          git push
